# Edge config for the `nginx` service (012, DR-004): serve the baked web SPA and
# reverse-proxy /api to the api container. HTTP only — TLS is terminated upstream
# (LB / Cloudflare), which is why we trust the forwarded scheme below.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API reverse proxy. proxy_pass has NO URI part, so nginx forwards the full
    # original request URI unchanged — the `/api` prefix is preserved, matching
    # the API's setGlobalPrefix("api"). The forwarded headers let the API's
    # TRUST_PROXY logic recover the real client IP/scheme for the login rate
    # limiter and production CORS.
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve the requested asset if it exists, otherwise hand back
    # index.html so client-side routes (react-router deep links) resolve.
    location / {
        try_files $uri /index.html;
    }
}
