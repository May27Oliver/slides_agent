name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm/action-setup reads the version from package.json "packageManager".
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # tsc --noEmit for every package (+ vite build for web).
      - run: pnpm -r build
      # vitest across domain / contracts / api / web (api uses in-memory PGlite — no DB needed).
      - run: pnpm test

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The e2e specs mock /api via page.route, so no backend/DB/worker is needed —
      # Playwright's webServer starts Vite itself. Only the browser binary is required.
      - name: Install Playwright browser
        run: pnpm --filter @slides-agent/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/test-results/
          if-no-files-found: ignore
          retention-days: 7
