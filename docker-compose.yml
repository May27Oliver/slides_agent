# Production single-host deployment (012): nginx (edge) + api + worker + one-shot
# migrate job + postgres + redis. One command brings the stack up:
#
#   cp .env.production.example .env   # then fill POSTGRES_* / secrets / ALLOWED_ORIGIN
#   docker compose up -d --build
#
# DR-006 single env path: compose interpolates ${VAR} from the repo-root .env to
# compose DATABASE_URL / HTTP_PORT, and the SAME .env is injected into the
# containers via env_file. Do not use --env-file pointing elsewhere.

# api, worker and migrate share ONE image (DR-001) and ONE backend env block —
# they differ only in `command:`. Anchors keep that single source of truth.
x-api-build: &api-build
  context: .
  dockerfile: docker/Dockerfile.api

# CI/CD (做法 B): CI builds + pushes these images to GHCR; the EC2 box only PULLS
# them (no build on the 2GB host). Local dev still uses `build:` below. The deploy
# job exports IMAGE_TAG=<git sha> to pull the exact build; defaults to `latest`.
x-api-image: &api-image ghcr.io/may27oliver/slides-agent-api:${IMAGE_TAG:-latest}
x-web-image: &web-image ghcr.io/may27oliver/slides-agent-web:${IMAGE_TAG:-latest}

x-backend-env: &backend-env
  # DATABASE_URL is composed from the POSTGRES_* single source (DR-006) — never
  # hand-written in .env. REDIS_URL / HOST / PORT are fixed by the compose
  # network. Secrets (OPENAI_API_KEY, AUTH_*, model + rate-limit knobs) come from
  # env_file below; `environment:` wins over env_file for the keys set here.
  NODE_ENV: production
  HOST: 0.0.0.0
  PORT: "3000"
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_URL: redis://redis:6379
  ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
  TRUST_PROXY: "1"
  # 015: PPTX artifacts — the worker WRITES the .pptx here, the api STREAMS the
  # download from the same path, so both containers mount the shared volume below.
  PPTX_ARTIFACT_DIR: /data/pptx-artifacts

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # One-shot job: migrate then seed, in order. Runs the SAME physical scripts as
  # dev (no prod-only logic). Gates api/worker via service_completed_successfully.
  migrate:
    build: *api-build
    image: *api-image
    command: sh -c "node --import tsx scripts/db-migrate.ts && node --import tsx scripts/db-seed.ts"
    environment: *backend-env
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  api:
    build: *api-build
    image: *api-image
    command: node --import tsx src/main.ts
    environment: *backend-env
    env_file: .env
    volumes:
      - pptx-artifacts:/data/pptx-artifacts
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Liveness only (DR-005): proves the HTTP server is up. Node 20 has global
      # fetch; the slim image has no curl. Readiness is gated by pg/redis above.
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    build: *api-build
    image: *api-image
    command: node --import tsx src/worker/worker.main.ts
    environment: *backend-env
    env_file: .env
    volumes:
      - pptx-artifacts:/data/pptx-artifacts
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No healthcheck (DR-005): non-HTTP process. restart keeps it resilient.
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    image: *web-image
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  # 015: PPTX export artifacts (worker writes, api reads); TTL-purged by the sweeper.
  pptx-artifacts:
